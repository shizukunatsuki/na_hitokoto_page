<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なつき</title>
    <!-- 初始 favicon (空心圆) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>○</text></svg>">
    <style>
        /* 引入 Noto Sans SC 字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap');

        :root {
            --primary-color: #6b4752;
            --bg-color: #fcefed;
        }

        /* 确保 html 和 body 占据完整高度，为 flex 布局做准备 */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: "Noto Sans SC", sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--primary-color);
            -webkit-tap-highlight-color: transparent;

            /* 使用 Flexbox 实现内容居中和自适应布局 */
            display: flex;
            flex-direction: column; /* 垂直排列 */
            justify-content: center; /* 垂直居中 */
            align-items: center;     /* 水平居中 */
            padding: 2%;
            box-sizing: border-box; /* 让 padding 不会影响总高度/宽度计算 */
        }

        /* #app 作为 Vue 的根节点，将继承 body 的 flex 特性 */
        #app {
            width: 100%;
            text-align: center;
        }

        /* 用于展示纯文本内容的样式 */
        .content-pre,
        .loading-text {
            font-size: 1.2em;
            color: var(--primary-color);
            white-space: pre-wrap;      /* 自动换行 */
            word-break: break-word;     /* 单词内换行 */
            margin: 0;
            max-width: 800px; /* 限制最大宽度，保证可读性 */
            display: inline-block; /* 允许 max-width 生效 */
            text-align: center; /* 确保文本居中 */
        }

        .loading-text {
            padding: 2em;
        }

        .page-link {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.74;
            transition: opacity 160ms ease;
        }

        .page-link:hover,
        .page-link:focus-visible {
            opacity: 1;
        }
    </style>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <a class="page-link" href="/history/">历史</a>
    <div id="app">
        <!-- 内容直接展示，不再有 container 包裹 -->
        <div v-if="is_loading" class="loading-text">Loading...</div>
        <pre v-else class="content-pre">{{ content_text }}</pre>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        // 生成 favicon 的 URL
        function get_favicon_url(icon) {
            return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${icon}</text></svg>`;
        }

        createApp({
            setup() {
                const content_text = ref('');
                const is_loading = ref(false);

                // 从指定 URL 获取纯文本内容
                const fetch_content = async () => {
                    is_loading.value = true;
                    try {
                        // 添加 cache: 'no-cache' 选项确保获取最新数据
                        const response = await fetch('https://content.hitokoto.natsuki.cloud/', {
                            cache: 'no-cache'
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP 错误！状态码: ${response.status}`);
                        }
                        content_text.value = await response.text();
                    } catch (error) {
                        console.error('获取内容时出错:', error);
                        // 提供更明确的错误信息，指出可能是 CORS 问题
                        content_text.value = `加载内容失败。\n请检查浏览器控制台中的错误信息，这很可能是由于服务器未配置 CORS 策略导致的。`;
                    } finally {
                        is_loading.value = false;
                    }
                };

                // 根据页面是否获得焦点来更新 favicon
                const update_favicon = (is_focused) => {
                    const icon = is_focused ? '●' : '○';
                    document.querySelector('link[rel="icon"]').href = get_favicon_url(icon);
                };

                onMounted(() => {
                    // 页面加载时获取内容
                    fetch_content();

                    // 添加窗口焦点事件监听器来更新 favicon
                    window.addEventListener('focus', () => update_favicon(true));
                    window.addEventListener('blur', () => update_favicon(false));
                });

                return {
                    content_text,
                    is_loading,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
