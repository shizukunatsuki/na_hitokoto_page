<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なつき</title>
    <!-- 初始 favicon (空心圆) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>○</text></svg>">
    <style>
        /* 引入 Noto Sans SC 字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap');

        :root {
            --primary-color: #6b4752;
            --secondary-color: #d1495b;
            --accent-color: #f08080;
            --bg-color: #fcefed;
            --container-bg-color: #fff;
            --box-shadow-color: rgba(0, 0, 0, 0.1);
            --box-shadow: 0 2px 5px var(--box-shadow-color);
        }

        body {
            font-family: "Noto Sans SC", sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 2%;
            background-color: var(--bg-color);
            color: var(--primary-color);
            -webkit-tap-highlight-color: transparent; /* 禁用移动端点击高亮 */
            display: flex; /* 使用 flex 布局使内容垂直居中 */
            justify-content: center;
            align-items: center;
            min-height: 96vh; /* 确保 body 至少和视口一样高 */
        }

        .container {
            max-width: 800px;
            width: 90%; /* 在小屏幕上占满宽度 */
            margin: 0 auto;
            background-color: var(--container-bg-color);
            padding: 40px; /* 调整内边距，使其更美观 */
            border-radius: 20px;
            box-shadow: var(--box-shadow);
            position: relative;
        }

        /* 用于展示纯文本内容的样式 */
        .content-pre {
            font-family: "Noto Sans SC", sans-serif; /* 继承字体 */
            font-size: 1.2em; /* 稍大一点的字体，使其更突出 */
            color: var(--primary-color);
            white-space: pre-wrap;      /* 自动换行 */
            word-break: break-word;     /* 单词内换行 */
            margin: 0; /* 移除 pre 标签的默认 margin */
            text-align: center; /* 文本居中显示 */
        }

        .loading-text {
            text-align: center;
            padding: 2em;
            font-size: 1.2em;
            color: var(--primary-color);
        }
    </style>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <div class="container">
             <!-- 内容 -->
            <div v-if="is_loading" class="loading-text">Loading...</div>
            <pre v-else class="content-pre">{{ content_text }}</pre>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        // 生成 favicon 的 URL
        function get_favicon_url(icon) {
            return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${icon}</text></svg>`;
        }

        createApp({
            setup() {
                const content_text = ref('');
                const is_loading = ref(false);

                // 从指定 URL 获取纯文本内容
                const fetch_content = async () => {
                    is_loading.value = true;
                    try {
                        // 添加 cache: 'no-cache' 选项确保获取最新数据
                        const response = await fetch('https://content.hitokoto.natsuki.cloud/', {
                            cache: 'no-cache'
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP 错误！状态码: ${response.status}`);
                        }
                        content_text.value = await response.text();
                    } catch (error) {
                        console.error('获取内容时出错:', error);
                        // 提供更明确的错误信息，指出可能是 CORS 问题
                        content_text.value = `加载内容失败。\n请检查浏览器控制台中的错误信息，这很可能是由于服务器未配置 CORS 策略导致的。`;
                    } finally {
                        is_loading.value = false;
                    }
                };

                // 根据页面是否获得焦点来更新 favicon
                const update_favicon = (is_focused) => {
                    const icon = is_focused ? '●' : '○';
                    document.querySelector('link[rel="icon"]').href = get_favicon_url(icon);
                };

                onMounted(() => {
                    // 页面加载时获取内容
                    fetch_content();

                    // 添加窗口焦点事件监听器来更新 favicon
                    window.addEventListener('focus', () => update_favicon(true));
                    window.addEventListener('blur', () => update_favicon(false));
                });

                return {
                    content_text,
                    is_loading,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
